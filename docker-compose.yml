services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dHJ1c3R5LWFraXRhLTc4LmNsZXJrLmFjY291bnRzLmRldiQ
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /select
        NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /select
    ports:
      - "3001:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    environment:
      - FASTAPI_BASE_URL=http://backend:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - GROWTHBOOK_API_URL=http://growthbook:3100
      - GOOGLE_APPLICATION_CREDENTIALS=/app/bigquery/experimentiq-494001-25cbf363afaa.json
    volumes:
      - ./bigquery:/app/bigquery:ro
      - credsdata:/app/data
    depends_on:
      - growthbook

  mongo:
    image: "mongo:latest"
    environment:
      # MONGO_USERNAME and MONGO_PASSWORD must be set in your environment or a .env file.
      # No defaults are provided — Docker Compose will fail loudly if these are missing
      # rather than silently using weak credentials.
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodata:/data/db
  growthbook:
    image: "growthbook/growthbook:latest"
    ports:
      - "3000:3000"
      - "3100:3100"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/growthbook?authSource=admin
    volumes:
      - uploads:/usr/local/src/app/packages/back-end/uploads
volumes:
  uploads:
  mongodata:
  credsdata:
